<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
      body { display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; text-align: center; margin: 0; }
      .err-code { font-size: 8rem; font-weight: 900; background: var(--grad1); -webkit-background-clip: text; color: transparent; margin-bottom: 10px; }
      .err-text { font-size: 1.5rem; color: var(--tx2); margin-bottom: 30px; }
    </style>
</head>
<body>
  <div class="err-code">404</div>
  <p class="err-text">Oops! The page you're looking for doesn't exist 🕵️‍♂️</p>
  <a href="/" class="btn btn-primary">Go Back Home</a>
</body>
</html>
